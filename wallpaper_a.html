<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PensaInfra Tron Legacy</title>

    <!-- Favicon opcional -->
    <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg">

    <!-- Fuente futurista -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            background: #000814;
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
        }

        /* 🔵 GRID TRON clásico */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background:
                linear-gradient(rgba(0, 180, 255, 0.25) 2px, transparent 2px),
                linear-gradient(90deg, rgba(0, 180, 255, 0.25) 2px, transparent 2px);
            background-size: 60px 60px;
            opacity: 0.18;
            z-index: -3;
            animation: gridMove 18s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: translateY(0); }
            100% { transform: translateY(60px); }
        }

        /* 🔵 Halo profundo estilo núcleo Tron */
        body::after {
            content: "";
            position: fixed;
            inset: 0;
            background: radial-gradient(
                circle at center,
                rgba(0, 212, 255, 0.55),
                rgba(0, 0, 0, 0.85) 60%
            );
            filter: blur(40px);
            z-index: -2;
        }

        /* 🔵 Anillo de energía (fondo circular luminoso) */
        .energy-ring {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 480px;
            height: 480px;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            background: radial-gradient(
                circle,
                rgba(0, 200, 255, 0.55) 0%,
                rgba(0, 200, 255, 0.12) 35%,
                rgba(0, 200, 255, 0.02) 60%,
                transparent 80%
            );
            box-shadow: 
                0 0 35px #00eaff,
                0 0 80px #00eaff,
                inset 0 0 40px rgba(0, 255, 255, 0.5);
            animation: pulsateRing 4s ease-in-out infinite;
            z-index: -1;
        }

        @keyframes pulsateRing {
            0% { transform: translate(-50%, -50%) scale(0.97); opacity: 0.85; }
            50% { transform: translate(-50%, -50%) scale(1.05); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(0.97); opacity: 0.85; }
        }

        /* Logo Pensa Software */
        .logo-wrapper {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .logo {
            width: 260px;
            filter:
                drop-shadow(0 0 15px #00eaff)
                drop-shadow(0 0 35px #00eaff)
                drop-shadow(0 0 60px #00eaff);
            animation: glowPulse 3.5s infinite ease-in-out;
        }

        @keyframes glowPulse {
            0% { filter: drop-shadow(0 0 12px #00eaff); }
            50% { filter: drop-shadow(0 0 50px #00eaff); }
            100% { filter: drop-shadow(0 0 12px #00eaff); }
        }
    </style>
</head>

<body>

    <!-- Anillo de energía Tron -->
    <div class="energy-ring"></div>

    <!-- Logo en el centro -->
    <div class="logo-wrapper">
        <img src="/icons/logo_negro.svg" alt="Pensa Logo" class="logo">
    </div>

</body>
</html>
